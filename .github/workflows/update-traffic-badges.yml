name: Update traffic badges

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate traffic badges
        env:
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          auth_scheme = "Bearer"
          headers = {
              "Authorization": f"{auth_scheme} {token}",
              "Accept": "application/vnd.github+json",
          }

          def fetch(path):
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/{path}",
                  headers=headers,
              )
              with urllib.request.urlopen(req) as resp:
                  return json.load(resp)

          clones = fetch("traffic/clones")
          views = fetch("traffic/views")

          def update_accumulator(path, label, api_response, key_name, default_start):
              if os.path.exists(path):
                  with open(path, "r", encoding="utf-8") as f:
                      old_data = json.load(f)
              else:
                  old_data = {"message": f"{default_start} total", "last_timestamp": "2000-01-01T00:00:00Z"}
                  
              try:
                  current_total = int(old_data.get("message", f"{default_start} total").split(" ")[0])
              except:
                  current_total = default_start
                  
              last_ts = old_data.get("last_timestamp", "2000-01-01T00:00:00Z")
              newest_ts = last_ts
              
              for day in api_response.get(key_name, []):
                  ts = day["timestamp"]
                  if ts > last_ts:
                      current_total += day["count"]
                      if ts > newest_ts:
                          newest_ts = ts
                          
              payload = {
                  "schemaVersion": 1,
                  "label": label,
                  "message": f"{current_total} total",
                  "color": "ff3366",
                  "last_timestamp": newest_ts
              }
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(payload, f, indent=2)

          os.makedirs(".github/badges", exist_ok=True)
          update_accumulator(".github/badges/clones.json", "Clones", clones, "clones", 180)
          update_accumulator(".github/badges/views.json", "Views", views, "views", 500)
          PY

      - name: Commit badge updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/*.json
          if ! git diff --staged --quiet; then
            git commit -m "Update traffic badges"
            git push
          else
            echo "No badge changes to commit."
          fi
